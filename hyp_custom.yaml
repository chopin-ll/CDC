# 自定义超参数（针对单通道肺结节检测优化）

# --- 优化器设置 ---
lr0: 0.0032             # 初始学习率 (SGD默认值，比0.01更稳健)
lrf: 0.01               # 最终学习率 (lr0 * lrf)
momentum: 0.937         # SGD 动量
weight_decay: 0.0005    # 权重衰减

# --- 预热设置 ---
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# --- 损失函数权重 ---
box: 7.5
cls: 0.5
dfl: 1.5

# --- 图像增强 (针对灰度图调整) ---
hsv_h: 0.0              # 色调：灰度图必须为0
hsv_s: 0.0              # 饱和度：灰度图必须为0
hsv_v: 0.15             # 明度：降低幅度，防止破坏结节特征 (原0.4太大)

# --- 几何变换 ---
degrees: 15.0           # 旋转角度
translate: 0.1          # 平移
scale: 0.5              # 缩放
shear: 0.0              # 剪切
perspective: 0.0        # 透视变换 (医学图像通常保持正交，设为0没问题)

# --- 翻转 ---
flipud: 0.5             # 上下翻转 (肺部解剖结构通常对称，可以保留)
fliplr: 0.5             # 左右翻转 (人体左右对称，非常有用的增强)

# --- 高级混合增强 ---
mosaic: 1.0             # 建议开启！对小目标(结节)检测非常有帮助
mixup: 0.2              # MixUp 保持开启
copy_paste: 0.0         # 复制粘贴 (对于结节可能产生不自然的重复纹理，建议关闭)